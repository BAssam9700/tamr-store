<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدعم الفني</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #0b132b, #1c2541);
  color: white;
  text-align: center;
}

.container {
  width: 90%;
  max-width: 600px;
  margin: 50px auto;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
  background: #333;
  color: white;
}

button {
  padding: 10px 20px;
  background: orange;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.ticket {
  background: #222;
  margin-top: 15px;
  padding: 10px;
  border-radius: 5px;
}

.reply {
  color: lightgreen;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">
  <h2>📩 إرسال تذكرة</h2>

  <input id="message" type="text" placeholder="اكتب رسالتك هنا">

  <button onclick="sendTicket()">إرسال</button>

  <h3>📂 تذاكري</h3>
  <div id="tickets"></div>
</div>

<script>
async function sendTicket() {
  const message = document.getElementById("message").value;

  if (!message) {
    alert("اكتب الرسالة");
    return;
  }

  try {
    await fetch('/tickets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });

    alert("تم الإرسال ✅");
    document.getElementById("message").value = "";
    loadTickets();

  } catch (err) {
    alert("خطأ ❌");
  }
}

async function loadTickets() {
  const res = await fetch('/tickets');
  const data = await res.json();

  const box = document.getElementById("tickets");
  box.innerHTML = "";

  data.forEach(t => {
    box.innerHTML += `
      <div class="ticket">
        <div>${t.message}</div>
        <div class="reply">
          ${t.reply ? "الرد: " + t.reply : "بانتظار الرد..."}
        </div>
      </div>
    `;
  });
}

loadTickets();
</script>

</body>
</html>
